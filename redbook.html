<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #fff;
            color: #1f1f1f;
        }

        /* 主容器 - 适配PC/移动端布局 */
        .container {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
            gap: 20px;
        }

        /* 左侧侧边栏 */
        .sidebar {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px 12px; /* 左右加内边距，增加可用宽度 */
            box-sizing: border-box;
            position: sticky;
            top: 0;
            width: 160px; /* 原宽度太窄，调整为120px，足够容纳“切换账号”不换行 */
        }

        .sidebar .logo {
            width: 80px; /* PC端宽度 */
            height: 32px; /* PC端高度，椭圆核心 */
            background-color: #ff2442; /* 小红书官方红 */
            border-radius: 16px; /* 高度的一半，实现完美椭圆 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            letter-spacing: 0.5px;
            /* 响应式基础：防止溢出 */
            flex-shrink: 0;
        }

        .sidebar .nav-list {
            margin-top: 20px; /* 新增：与logo保持20px间距，美观大方 */
            display: flex;
            flex-direction: column;
            gap: 16px; /* 导航项之间间距保留，保证纵向排版 */
        }

        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            color: #1f1f1f;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }

        .sidebar .nav-item:hover {
            background-color: #f5f5f5;
        }

        .sidebar .nav-item i {
            font-size: 20px;
        }

        /* 切换账号按钮样式 */
        .sidebar .switch-account-btn {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background-color: #f8f8f8;
            border-radius: 20px;
            color: #1f1f1f;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: calc(100% - 24px); /* 适配新的侧边栏内边距 */
            margin-left: 12px;
            margin-bottom: 16px;
            white-space: nowrap; /* 新增：强制文字不换行 */
        }

        .sidebar .switch-account-btn:hover {
            color: #1f1f1f;
            background-color: #f0f0f0;
        }

        /* 切换账号弹窗样式 */
        .switch-account-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            z-index: 999;
        }
        .switch-account-modal.active {
            display: block;
        }
        .modal-mask {
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        .modal-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #f5f5f5;
        }
        .modal-header h3 {
            font-size: 18px;
            font-weight: 500;
            color: #1f1f1f;
        }
        .switch-modal-close {
            width: 24px; /* 从32px缩小为28px，避免超出弹窗框 */
            height: 24px;
            border: none;
            background: transparent;
            color: #8c8c8c; /* 默认灰色图标 */
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 微调位置，彻底避免超出弹窗 */
            position: relative;
            top: 0;
            right: 0;
            transition: all 0.2s ease; /* 顺滑过渡 */
        }
        .switch-modal-close:hover {
            background-color: #fef0f0; /* 浅红背景 */
            color: #ff2442; /* 小红书官方红 */
        }
        .modal-body {
            padding: 20px;
        }
        .input-item {
            margin-bottom: 16px;
        }
        .input-item label {
            display: block;
            font-size: 14px;
            color: #1f1f1f;
            margin-bottom: 8px;
        }
        .input-item input {
            width: 100%;
            height: 44px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 0 12px;
            font-size: 14px;
            outline: none;
        }
        .input-item input:focus {
            border-color: #ff2442;
        }
        .modal-footer {
            padding: 0 20px 20px;
        }
        .modal-footer .login-btn {
            width: 100%;
            height: 48px;
            background-color: #ff2442;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .modal-footer .login-btn:hover {
            background-color: #e01f3d;
        }

        /* 左侧个人入口样式 */
        .sidebar .user-entry {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            color: #1f1f1f;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }

        .sidebar .user-entry:hover {
            background-color: #f5f5f5;
        }

        .sidebar .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%; /* 圆形头像 */
            object-fit: cover;
            border: 1px solid #e0e0e0;
        }

        .sidebar .user-text {
            font-size: 16px;
            color: #1f1f1f;
        }

        /* 右侧主内容区 */
        .main-content {
            flex: 1;
            padding-top: 20px;
        }

        /* 顶部搜索栏 */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            position: sticky;
            top: 0;
            background-color: #fff;
            padding: 8px 0;
            z-index: 10;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            height: 40px;
            background-color: #f5f5f5;
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: #1f1f1f;
        }

        .search-box input::placeholder {
            color: #8c8c8c;
        }

        .top-nav {
            display: flex;
            gap: 24px;
            font-size: 14px;
            color: #8c8c8c;
        }

        .top-nav span {
            cursor: pointer;
            transition: color 0.2s;
        }

        .top-nav span:hover {
            color: #1f1f1f;
        }

        /* 分类标签栏 */
        .category-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            font-size: 16px;
            color: #8c8c8c;
            cursor: pointer;
            white-space: nowrap;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .category-tab.active {
            color: #1f1f1f;
            font-weight: 500;
            border-bottom: 2px solid #ff2442;
        }

        .category-tab:hover {
            color: #1f1f1f;
        }

        /* 笔记卡片列表 */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .note-card {
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .note-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .note-card .cover {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            background-color: #f5f5f5;
        }

        .note-card .info {
            padding: 12px;
        }

        .note-card .title {
            font-size: 14px;
            color: #1f1f1f;
            line-height: 1.5; /* 行高=21px */
            margin-bottom: 8px;
            height: 42px; /* 2行 × 21px = 42px，精准控制高度 */
            overflow: hidden;
            position: relative;
            padding-right: 10px; /* 给省略号留空间 */
            word-break: break-all;
        }

        /* 模拟省略号 */
        .note-card .title::after {
            content: '...';
            position: absolute;
            right: 0;
            bottom: 0;
            background-color: #fff; /* 覆盖最后一个字，与背景色一致 */
            padding-left: 5px;
        }

        .note-card .author {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .note-card .author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #e0e0e0;
        }

        .note-card .author-name {
            font-size: 12px;
            color: #8c8c8c;
        }

        .note-card .stats {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #8c8c8c;
        }

        

        /* 移动端适配 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                padding: 0 8px;
            }

            .sidebar {
                flex-direction: row;
                height: auto;
                padding: 12px 16px;
                position: static;
                width: 100%; /* 移动端占满宽度 */
            }

            .sidebar .logo {
                width: 70px; /* 移动端缩小宽度，适配小屏 */
                height: 28px; /* 等比例缩小高度，保持椭圆比例 */
                border-radius: 14px; /* 高度的一半，维持椭圆形态 */
                font-size: 14px; /* 移动端文字缩小，适配尺寸 */
                margin-bottom: 8px; /* 增加底部间距，适配横向导航 */
            }

            .sidebar .user-entry {
                margin-top: 0;
                padding: 8px 8px;
            }
            .sidebar .user-avatar {
                width: 20px;
                height: 20px;
            }
            .sidebar .user-text {
                font-size: 14px;
            }

            .sidebar .nav-list {
                margin-top: 0; /* 移动端取消logo间距 */
                flex-direction: row;
                gap: 16px;
            }

            .sidebar .switch-account-btn {
                margin-top: 0;
                margin-left: auto;
                margin-bottom: 0;
                padding: 6px 12px;
                font-size: 14px;
                border-radius: 16px;
                width: auto;
                white-space: nowrap; /* 移动端也强制不换行 */
            }

            /* 弹窗适配 */
            .modal-box {
                width: 95%;
                max-width: 350px;
            }
            .modal-header {
                padding: 12px 16px;
            }
            .modal-body {
                padding: 16px;
            }
            .input-item input {
                height: 40px;
            }
            .modal-footer .login-btn {
                height: 44px;
                font-size: 14px;
            }
            .switch-modal-close {
                width: 24px; /* 移动端进一步缩小 */
                height: 24px;
                font-size: 12px; /* 图标字体同步缩小 */
            }

            .top-nav {
                display: none;
            }

            .search-box {
                max-width: 100%;
            }

            .notes-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 8px;
            }

            .modal-content {
                flex-direction: column;
                max-height: 90vh;
            }

            .modal-cover {
                width: 100%;
                height: 300px;
            }

            .modal-detail {
                width: 100%;
                padding: 16px;
            }
        }
    </style>
    <!-- 引入图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 主容器 -->
    <div class="container">
        <!-- 左侧侧边栏 -->
        <div class="sidebar">
            <div class="logo">小红书</div>
            <div class="nav-list">
                <div class="nav-item">
                    <i class="fas fa-compass"></i>
                    <span>发现</span>
                </div>
                <div class="nav-item">
                    <i class="fas fa-plus"></i>
                    <span>发布</span>
                </div>
                <div class="nav-item">
                    <i class="fas fa-bell"></i>
                    <span>通知</span>
                </div>
            </div>
            <!-- 切换账号按钮-->
            <div class="switch-account-btn">
                <i class="fas fa-bars"></i> 
                <span>登录账号</span> 
            </div>
        </div>

        <!-- 右侧主内容区 -->
        <div class="main-content">
            <!-- 顶部搜索栏 -->
            <div class="top-bar">
                <div class="search-box">
                    <i class="fas fa-search" style="color: #8c8c8c;"></i>
                    <input type="text" placeholder="搜索账号查看更多内容">
                </div>
                <div class="top-nav">
                    <span>创作中心</span>
                    <span>业务合作</span>
                </div>
            </div>

            <!-- 分类标签栏 -->
            <div class="category-tabs">
                <div class="category-tab active">推荐</div>
                <div class="category-tab">穿搭</div>
                <div class="category-tab">美食</div>
                <div class="category-tab">彩妆</div>
                <div class="category-tab">影视</div>
                <div class="category-tab">职场</div>
                <div class="category-tab">情感</div>
                <div class="category-tab">家居</div>
                <div class="category-tab">游戏</div>
                <div class="category-tab">旅行</div>
                <div class="category-tab">健身</div>
            </div>

            <!-- 笔记卡片列表 -->
            <div class="notes-grid">
                <!-- 笔记1 -->
                <div class="note-card">
                    <img class="cover" src="images/mei.png" alt="笔记封面">
                    <div class="info">
                        <div class="title">和任何脸型都能搭配上的眉毛教程来啦！</div>
                        <div class="author">
                            <img class="author-avatar" src="images/Avatar/26.png" alt="作者头像">
                            <span class="author-name">蛋糕小厨</span>
                        </div>
                        <div class="stats">
                            <i class="fas fa-heart"></i>
                            <span>3.9万</span>
                        </div>
                    </div>
                </div>

                <!-- 笔记2 -->
                <div class="note-card">
                    <img class="cover" src="images/fangjia.png" alt="笔记封面">
                    <div class="info">
                        <div class="title">这个妈，我又不当啦！</div>
                        <div class="author">
                            <img class="author-avatar" src="images/Avatar/6.png" alt="作者头像">
                            <span class="author-name">汉堡超人</span>
                        </div>
                        <div class="stats">
                            <i class="fas fa-heart"></i>
                            <span>9643</span>
                        </div>
                    </div>
                </div>

                <!-- 笔记3 -->
                <div class="note-card">
                    <img class="cover" src="images/che.png" alt="笔记封面">
                    <div class="info">
                        <div class="title">阴天 傍晚 车窗外</div>
                        <div class="author">
                            <img class="author-avatar" src="images/Avatar/5.png" alt="作者头像">
                            <span class="author-name">薯条崽崽</span>
                        </div>
                        <div class="stats">
                            <i class="fas fa-heart"></i>
                            <span>8066</span>
                        </div>
                    </div>
                </div>

                <!-- 笔记4 -->
                <div class="note-card">
                    <img class="cover" src="images/yu.png" alt="笔记封面">
                    <div class="info">
                        <div class="title">雨后深夜，踩碎了一地霓虹</div>
                        <div class="author">
                            <img class="author-avatar" src="images/Avatar/10.png" alt="作者头像">
                            <span class="author-name">甜甜圈酱</span>
                        </div>
                        <div class="stats">
                            <i class="fas fa-heart"></i>
                            <span>7351</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 切换账号弹窗 -->
    <div class="switch-account-modal">
        <div class="modal-mask"></div>
        <div class="modal-box">
            <div class="modal-header">
                <h3>登录账号</h3>
                <button class="modal-close switch-modal-close"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="input-item">
                    <label>账号</label>
                    <input type="text" id="accountInput" placeholder="请输入小红书账号">
                </div>
                <div class="input-item">
                    <label>密码</label>
                    <input type="password" id="passwordInput" placeholder="请输入密码">
                </div>
            </div>
            <div class="modal-footer">
                <button class="login-btn">登录</button>
            </div>
        </div>
    </div>

    <script>
        // 切换账号弹窗逻辑
        const switchAccountBtn = document.querySelector('.switch-account-btn');
        const switchAccountModal = document.querySelector('.switch-account-modal');
        const switchAccountModalClose = document.querySelector('.switch-modal-close');
        const loginBtn = document.querySelector('.modal-footer .login-btn');
        const accountInput = document.getElementById('accountInput');
        const passwordInput = document.getElementById('passwordInput');

        // 打开弹窗
        switchAccountBtn.addEventListener('click', () => {
            // 清空输入框
            document.getElementById('accountInput').value = '';
            document.getElementById('passwordInput').value = '';
            switchAccountModal.classList.add('active');
            document.body.style.overflow = 'hidden'; // 禁止页面滚动
        });

        // 关闭弹窗
        function closeModal() {
            const switchAccountModal = document.querySelector('.switch-account-modal');
            switchAccountModal.classList.remove('active');
            document.body.style.overflow = 'auto'; // 恢复页面滚动
            // 清空输入框，提升体验
            document.getElementById('accountInput').value = '';
            document.getElementById('passwordInput').value = '';
            // 点击关闭后返回当前页面（保持滚动位置，无需跳转）
            window.scrollTo(0, window.scrollY);
        }
        // 绑定关闭按钮点击事件（确保触发关闭逻辑）
        switchAccountModalClose.addEventListener('click', closeModal);
        // 点击遮罩层关闭弹窗
        document.querySelector('.modal-mask').addEventListener('click', closeModal);

        // 模拟登录逻辑
        loginBtn.addEventListener('click', () => {
            const account = accountInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!account || !password) {
                alert('请输入账号和密码！');
                return;
            }
            
            // 验证账号密码
            if (account === '柰花集' && password === 'n@1hu@j1oS18') {
                alert(`账号 ${account} 登录成功！`);
                closeModal();
                window.location.href = 'redbook-lin.html';
            } else if (account === '周哥副业实战' && password === 'jjalsyjc') {
                alert(`账号 ${account} 登录成功！`);
                closeModal();
                window.location.href = 'redbook-zhou.html';
            } else if (account === '柰花集') {
                alert('密码错误！提示：尝试将常用密码进行字符替换');
            } else if (account === '周哥副业实战') {
                alert('密码错误！提示：尝试周明的愿望（首字母小写）');
            } else {
                alert('该账号不存在！');
            }
        });

        // 搜索框交互逻辑 
        const searchInput = document.querySelector('.search-box input');
        searchInput.addEventListener('keydown', (e) => {
            // 监听回车键（兼容新旧浏览器key/keyCode）
            if (e.key === 'Enter' ) {
                const searchText = searchInput.value.trim(); // 去除首尾空格
                if (searchText === '柰花集') {
                    // 匹配关键词，跳转至指定页面
                    window.location.href = 'ssredbook-lin.html';
                } 
                else if (searchText === '周哥副业实战') {
                    // 匹配关键词，跳转至对应的页面
                    window.location.href = 'ssredbook-zhou.html';
                }
                else {
                    // 不匹配则提示并清空输入框
                    alert('搜索不到该账号相关信息');
                    searchInput.value = '';
                }
            }
        });
    </script>
</body>
</html>
